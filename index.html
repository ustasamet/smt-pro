<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMT PRO — Samet Method Trading</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg:#0B0F11; --surface:#12181B; --surface-2:#1A2226; --surface-3:#212B30;
  --border:#28333A; --border-soft:#1E272C;
  --text:#E7ECEE; --text-dim:#9AA7AC; --text-faint:#5E6C72;
  --gold:#C9A24B; --gold-bright:#E0BC66; --gold-dim: rgba(201,162,75,0.14);
  --green:#5FA37A; --green-dim: rgba(95,163,122,0.14);
  --red:#C1584C; --red-dim: rgba(193,88,76,0.14);
  --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
* { box-sizing: border-box; }
html, body, #root { height:100%; margin:0; }
body { background: var(--bg); font-family: var(--font-body); }
div, button, input, select, textarea, span { font-family: var(--font-body); }

.header { display:flex; align-items:center; justify-content:space-between; padding:20px 28px; border-bottom:1px solid var(--border-soft); flex-wrap:wrap; gap:12px; }
.brand { display:flex; align-items:center; gap:12px; }
.brand-mark { font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--bg); background:linear-gradient(135deg, var(--gold-bright), var(--gold)); width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; letter-spacing:0.5px; }
.brand-title { font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--text); letter-spacing:0.3px; }
.brand-sub { font-size:11px; color:var(--text-faint); margin-top:1px; }

.mode-switch, .subnav { display:flex; gap:8px; flex-wrap:wrap; }
.subnav { padding:16px 28px 0; }

.pill { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-size:12.5px; font-weight:500; cursor:pointer; transition:all .15s ease; }
.pill:hover { color:var(--text); border-color:var(--gold); }
.pill-active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold-bright); }

.panel { padding:22px 28px 40px; max-width:1180px; margin:0 auto; }
.panel-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.panel-title { font-family:var(--font-display); font-size:17px; font-weight:600; color:var(--text); }
.panel-sub { font-size:12px; color:var(--text-faint); margin-top:2px; }

.btn-gold { display:flex; align-items:center; gap:6px; background:var(--gold); color:#1A1406; border:none; padding:9px 16px; border-radius:8px; font-weight:600; font-size:12.5px; cursor:pointer; }
.btn-gold:hover { background:var(--gold-bright); }
.btn-ghost { display:flex; align-items:center; gap:6px; background:transparent; color:var(--text-dim); border:1px solid var(--border); padding:8px 14px; border-radius:8px; font-size:12.5px; cursor:pointer; }
.btn-ghost:hover { color:var(--text); border-color:var(--text-faint); }
.btn-ghost-danger { display:flex; align-items:center; gap:6px; background:transparent; color:var(--red); border:1px solid var(--red); opacity:0.75; padding:6px 12px; border-radius:6px; font-size:11.5px; cursor:pointer; margin-top:8px; }
.btn-ghost-danger:hover { opacity:1; }
.btn-icon-only { padding:5px 7px; margin-top:0; }

.form-card { background:var(--surface); border:1px solid var(--border-soft); border-radius:12px; padding:20px; margin-bottom:20px; }
.form-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; }
.field { display:flex; flex-direction:column; gap:5px; }
.field-label { font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-faint); font-weight:600; }
input, select, textarea { background:var(--surface-2); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:6px; font-size:12.5px; font-family:var(--font-mono); width:100%; }
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--gold); }
textarea { font-family:var(--font-body); resize:vertical; }
.form-actions { display:flex; justify-content:flex-end; margin-top:16px; }

.dir-toggle { display:flex; gap:6px; }
.dir-toggle button { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); font-size:12px; cursor:pointer; }
.dir-on-long { border-color:var(--green) !important; color:var(--green) !important; background:var(--green-dim) !important; }
.dir-on-short { border-color:var(--red) !important; color:var(--red) !important; background:var(--red-dim) !important; }

.checklist-block { margin-top:16px; padding:16px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:10px; }
.checklist-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; font-size:11.5px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; flex-wrap:wrap; gap:8px; }
.gate { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:10.5px; font-weight:700; letter-spacing:0.03em; }
.gate-ok { background:var(--green-dim); color:var(--green); }
.gate-no { background:var(--red-dim); color:var(--red); }

.chain { display:flex; align-items:center; flex-wrap:wrap; }
.chain-node-wrap { display:flex; align-items:center; flex-direction:column; position:relative; }
.chain-node { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); color:var(--text-faint); display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1; }
.chain-node-on { border-color:var(--gold); background:var(--gold); color:#1A1406; }
.chain-dot { width:4px; height:4px; border-radius:50%; background:var(--text-faint); }
.chain-label { font-size:9px; color:var(--text-faint); margin-top:5px; white-space:nowrap; max-width:60px; text-align:center; }
.chain-line { position:absolute; top:11px; left:22px; width:22px; height:1.5px; background:var(--border); }
.chain-compact .chain-node { width:14px; height:14px; }
.chain-compact .chain-line { top:7px; left:14px; width:8px; }
.chain-compact { gap:0; }

.trade-list { display:flex; flex-direction:column; gap:8px; }
.trade-row { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; overflow:hidden; }
.trade-row-main { display:flex; align-items:center; gap:16px; padding:12px 16px; cursor:pointer; font-family:var(--font-mono); font-size:12px; flex-wrap:wrap; }
.trade-row-main:hover { background:var(--surface-2); }
.tr-date { color:var(--text-faint); width:80px; }
.tr-pair { font-weight:600; color:var(--text); width:64px; }
.tr-dir { display:flex; align-items:center; gap:4px; width:64px; }
.dir-long { color:var(--green); } .dir-short { color:var(--red); }
.tr-kz { color:var(--text-dim); width:60px; }
.tr-grade { color:var(--gold); width:24px; }
.tr-result { padding:2px 8px; border-radius:5px; font-size:10.5px; font-weight:700; width:40px; text-align:center; }
.res-win { background:var(--green-dim); color:var(--green); } .res-loss { background:var(--red-dim); color:var(--red); } .res-be { background:var(--surface-3); color:var(--text-dim); }
.tr-r { width:50px; color:var(--text); }
.tr-pnl { width:70px; color:var(--text); }
.tr-expand { margin-left:auto; color:var(--text-faint); }
.trade-row-detail { padding:16px; border-top:1px solid var(--border-soft); background:var(--surface-2); }
.detail-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; font-size:11.5px; }
.detail-grid div { display:flex; flex-direction:column; gap:2px; color:var(--text); }
.detail-grid b { font-size:9.5px; text-transform:uppercase; color:var(--text-faint); font-weight:600; letter-spacing:0.04em; }
.detail-note { margin-top:12px; font-size:12px; color:var(--text-dim); background:var(--surface); padding:10px; border-radius:6px; }
.detail-shots { display:flex; gap:10px; margin-top:10px; }
.shot-link { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--gold); text-decoration:none; }
.empty { padding:32px; text-align:center; color:var(--text-faint); font-size:12.5px; border:1px dashed var(--border); border-radius:10px; }

.stat-row { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:22px; }
.stat-card { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:14px 16px; }
.stat-label { font-size:10.5px; text-transform:uppercase; color:var(--text-faint); letter-spacing:0.05em; font-weight:600; margin-bottom:6px; }
.stat-value { font-family:var(--font-mono); font-size:22px; font-weight:600; color:var(--text); }
.stat-value.good { color:var(--green); } .stat-value.bad { color:var(--red); }
.stat-sub { font-size:10px; color:var(--text-faint); margin-top:2px; }

.pair-breakdown { display:flex; flex-direction:column; gap:12px; }
.pair-row { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:14px 16px; }
.pair-row-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; flex-wrap:wrap; gap:6px; }
.pair-name { font-family:var(--font-display); font-weight:600; color:var(--text); font-size:14px; }
.pair-meta { font-size:11px; color:var(--text-faint); font-family:var(--font-mono); }
.bar-track { position:relative; height:22px; background:var(--surface-3); border-radius:6px; overflow:hidden; }
.bar-track-slim { height:8px; }
.bar-fill { height:100%; background:linear-gradient(90deg, var(--gold), var(--gold-bright)); border-radius:6px; }
.bar-fill.bar-danger { background:linear-gradient(90deg, var(--red), #d8776c); }
.bar-label { position:absolute; right:8px; top:2px; font-size:10.5px; font-family:var(--font-mono); color:var(--text); }

.ai-teaser { margin-top:24px; border:1px dashed var(--gold); background:var(--gold-dim); border-radius:10px; padding:16px 18px; }
.ai-teaser-title { font-family:var(--font-display); font-weight:600; color:var(--gold-bright); font-size:13px; margin-bottom:5px; }
.ai-teaser-body { font-size:12px; color:var(--text-dim); line-height:1.5; }

.lab-grid { display:grid; grid-template-columns:280px 1fr; gap:20px; align-items:start; }
.lab-filters { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:16px; display:flex; flex-direction:column; gap:16px; }
.lab-group-title { font-size:10.5px; text-transform:uppercase; color:var(--text-faint); font-weight:600; letter-spacing:0.05em; margin-bottom:8px; }
.chip-row { display:flex; flex-wrap:wrap; gap:6px; }
.chip { padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); font-size:11px; cursor:pointer; }
.chip-on { border-color:var(--gold); background:var(--gold-dim); color:var(--gold-bright); }
.lab-results { display:flex; flex-direction:column; gap:16px; }
.lab-list { display:flex; flex-direction:column; gap:6px; }
.lab-item { display:grid; grid-template-columns:70px 60px 60px 44px 50px 30px; gap:12px; align-items:center; background:var(--surface); border:1px solid var(--border-soft); padding:9px 14px; border-radius:8px; font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); }

.dd-bars { display:flex; flex-direction:column; gap:14px; margin-bottom:8px; }
.dd-bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); font-family:var(--font-mono); margin-bottom:6px; }

@media (max-width: 860px) {
  .form-grid { grid-template-columns:repeat(2,1fr); }
  .stat-row { grid-template-columns:repeat(2,1fr); }
  .lab-grid { grid-template-columns:1fr; }
  .trade-row-main { flex-wrap:wrap; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ---------------------------------------------------------
   Minimal inline icon set (no external icon library needed)
--------------------------------------------------------- */
function Icon({ name, size = 14, style }) {
  const s = { width: size, height: size, ...style };
  const common = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", style: s };
  switch (name) {
    case "plus": return <svg {...common}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>;
    case "x": return <svg {...common}><line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" /></svg>;
    case "check": return <svg {...common}><polyline points="4,13 9,18 20,6" /></svg>;
    case "chevronDown": return <svg {...common}><polyline points="6,9 12,15 18,9" /></svg>;
    case "chevronUp": return <svg {...common}><polyline points="18,15 12,9 6,15" /></svg>;
    case "trendUp": return <svg {...common}><polyline points="3,17 10,10 14,14 21,6" /><polyline points="15,6 21,6 21,12" /></svg>;
    case "trendDown": return <svg {...common}><polyline points="3,7 10,14 14,10 21,18" /><polyline points="15,18 21,18 21,12" /></svg>;
    case "trash": return <svg {...common}><polyline points="3,6 5,6 21,6" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /></svg>;
    case "filter": return <svg {...common}><polygon points="4,4 20,4 14,12 14,19 10,21 10,12" /></svg>;
    case "save": return <svg {...common}><path d="M5 3h11l4 4v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" /><path d="M8 3v6h8V3" /><path d="M8 21v-6h8v6" /></svg>;
    case "alert": return <svg {...common}><path d="M12 3l10 18H2z" /><line x1="12" y1="9" x2="12" y2="14" /><circle cx="12" cy="17.5" r="0.6" fill="currentColor" stroke="none" /></svg>;
    case "gauge": return <svg {...common}><path d="M4 15a8 8 0 0 1 16 0" /><line x1="12" y1="15" x2="16" y2="10" /><circle cx="12" cy="15" r="1" fill="currentColor" stroke="none" /></svg>;
    case "grid": return <svg {...common}><rect x="3" y="3" width="8" height="8" rx="1" /><rect x="13" y="3" width="8" height="8" rx="1" /><rect x="3" y="13" width="8" height="8" rx="1" /><rect x="13" y="13" width="8" height="8" rx="1" /></svg>;
    case "flask": return <svg {...common}><path d="M9 3h6" /><path d="M10 3v6l-6 10a1 1 0 0 0 .9 1.5h14.2A1 1 0 0 0 20 19L14 9V3" /></svg>;
    case "radio": return <svg {...common}><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none" /><path d="M8 12a4 4 0 0 1 8 0" /><path d="M5 12a7 7 0 0 1 14 0" /></svg>;
    case "settings": return <svg {...common}><circle cx="12" cy="12" r="3" /><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" /></svg>;
    case "image": return <svg {...common}><rect x="3" y="4" width="18" height="16" rx="2" /><circle cx="8.5" cy="9.5" r="1.5" /><path d="M21 16l-5-5-5 5-3-3-3 3" /></svg>;
    default: return null;
  }
}

/* ---------------------------------------------------------
   SMT PRO — data model & helpers
--------------------------------------------------------- */
const PAIRS = ["XAUUSD", "NAS100", "US30", "EURUSD", "GBPUSD", "BTCUSD", "SPX500"];
const KILLZONES = ["Asia", "London", "NY AM", "NY PM", "Other"];
const BIAS = ["Bullish", "Bearish", "Range"];
const PD = ["Premium", "Discount", "Equilibrium"];
const GRADES = ["A+", "A", "B", "C"];
const RESULTS = ["Win", "Loss", "BE"];

const CHECKLIST = [
  { key: "htfBias", label: "HTF Bias" },
  { key: "dolConfirmed", label: "Draw on Liquidity" },
  { key: "pdConfirmed", label: "Premium / Discount" },
  { key: "sweep", label: "Sweep" },
  { key: "displacement", label: "Displacement" },
  { key: "fvg", label: "FVG" },
  { key: "pullback", label: "Pullback" },
  { key: "mss", label: "MSS" },
  { key: "kzConfirmed", label: "Kill Zone" },
];

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const todayStr = () => new Date().toISOString().slice(0, 10);
const num = (v, d = 0) => (v === "" || v === null || v === undefined || isNaN(v) ? d : Number(v));
const fmt1 = (v) => (Number.isFinite(v) ? v.toFixed(1) : "0.0");
const fmt2 = (v) => (Number.isFinite(v) ? v.toFixed(2) : "0.00");

const emptyTrade = (mode) => ({
  id: uid(), mode, date: todayStr(), pair: "XAUUSD", timeframe: "15m", direction: "Long",
  weeklyBias: "Bullish", dailyBias: "Bullish", pd: "Discount", dol: "", asiaHigh: "", asiaLow: "",
  dr: "", idr: "", killzone: "London",
  htfBias: false, dolConfirmed: false, pdConfirmed: false, sweep: false, displacement: false,
  fvg: false, pullback: false, mss: false, kzConfirmed: false,
  riskPct: 1, rr: 3, setupGrade: "A", result: "Win", achievedR: 0,
  screenshotBefore: "", screenshotAfter: "", note: "",
});

const defaultAccount = { name: "Funded Account", size: 100000, dailyLimitPct: 4, maxDrawdownPct: 8 };

/* ---------------------------------------------------------
   Storage — localStorage (this file is self-hosted, no Claude API)
--------------------------------------------------------- */
function loadKey(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function saveKey(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.error("storage save failed", e); }
}

function computeStats(list) {
  const total = list.length;
  const wins = list.filter((t) => t.result === "Win");
  const losses = list.filter((t) => t.result === "Loss");
  const winRate = total ? (wins.length / total) * 100 : 0;
  const grossWin = wins.reduce((s, t) => s + Math.max(0, num(t.achievedR)), 0);
  const grossLoss = Math.abs(losses.reduce((s, t) => s + Math.min(0, num(t.achievedR)), 0));
  const pf = grossLoss > 0 ? grossWin / grossLoss : grossWin > 0 ? Infinity : 0;
  const avgR = total ? list.reduce((s, t) => s + num(t.achievedR), 0) / total : 0;
  return { total, winRate, pf, avgR };
}

/* ---------------------------------------------------------
   Small UI atoms
--------------------------------------------------------- */
function Pill({ active, onClick, children, icon }) {
  return (
    <button className={`pill ${active ? "pill-active" : ""}`} onClick={onClick} type="button">
      {icon && <Icon name={icon} size={13} />}
      {children}
    </button>
  );
}
function StatCard({ label, value, sub, tone }) {
  return (
    <div className="stat-card">
      <div className="stat-label">{label}</div>
      <div className={`stat-value ${tone || ""}`}>{value}</div>
      {sub && <div className="stat-sub">{sub}</div>}
    </div>
  );
}
function ConfluenceChain({ trade, onToggle, compact }) {
  return (
    <div className={`chain ${compact ? "chain-compact" : ""}`}>
      {CHECKLIST.map((c, i) => (
        <div className="chain-node-wrap" key={c.key}>
          <button type="button" className={`chain-node ${trade[c.key] ? "chain-node-on" : ""}`} onClick={() => onToggle(c.key)} title={c.label}>
            {trade[c.key] ? <Icon name="check" size={12} /> : <span className="chain-dot" />}
          </button>
          {!compact && <span className="chain-label">{c.label}</span>}
          {i < CHECKLIST.length - 1 && <span className="chain-line" style={trade[c.key] ? { background: "var(--gold)" } : undefined} />}
        </div>
      ))}
    </div>
  );
}
function Field({ label, children, span }) {
  return (
    <label className="field" style={span ? { gridColumn: `span ${span}` } : undefined}>
      <span className="field-label">{label}</span>
      {children}
    </label>
  );
}

/* ---------------------------------------------------------
   Main App
--------------------------------------------------------- */
function SMTPro() {
  const [trades, setTrades] = useState(() => loadKey("smtpro:trades", []));
  const [account, setAccount] = useState(() => loadKey("smtpro:live-account", defaultAccount));
  const [mode, setMode] = useState("research");
  const [researchTab, setResearchTab] = useState("log");
  const [formOpen, setFormOpen] = useState(false);
  const [draft, setDraft] = useState(emptyTrade("research"));
  const [liveDraft, setLiveDraft] = useState(emptyTrade("live"));
  const [liveFormOpen, setLiveFormOpen] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [accountEditOpen, setAccountEditOpen] = useState(false);

  const persistTrades = (next) => { setTrades(next); saveKey("smtpro:trades", next); };
  const persistAccount = (next) => { setAccount(next); saveKey("smtpro:live-account", next); };

  const researchTrades = useMemo(() => trades.filter((t) => t.mode === "research"), [trades]);
  const liveTrades = useMemo(() => trades.filter((t) => t.mode === "live"), [trades]);
  const confluenceCount = (t) => CHECKLIST.filter((c) => t[c.key]).length;

  const saveDraft = () => { persistTrades([draft, ...trades]); setDraft(emptyTrade("research")); setFormOpen(false); };
  const deleteTrade = (id) => persistTrades(trades.filter((t) => t.id !== id));
  const saveLiveDraft = () => { persistTrades([liveDraft, ...trades]); setLiveDraft(emptyTrade("live")); setLiveFormOpen(false); };

  const byPair = useMemo(() => {
    const groups = {};
    researchTrades.forEach((t) => { groups[t.pair] = groups[t.pair] || []; groups[t.pair].push(t); });
    return Object.entries(groups).map(([pair, list]) => ({ pair, ...computeStats(list) })).sort((a, b) => b.total - a.total);
  }, [researchTrades]);
  const overall = useMemo(() => computeStats(researchTrades), [researchTrades]);

  const [labFilters, setLabFilters] = useState({ pairs: [], killzones: [], directions: [], grades: [], results: [], sweep: false, displacement: false, mss: false, pullback: false });
  const toggleArr = (field, val) => setLabFilters((f) => ({ ...f, [field]: f[field].includes(val) ? f[field].filter((x) => x !== val) : [...f[field], val] }));
  const toggleBool = (field) => setLabFilters((f) => ({ ...f, [field]: !f[field] }));

  const labResult = useMemo(() => {
    const list = researchTrades.filter((t) => {
      if (labFilters.pairs.length && !labFilters.pairs.includes(t.pair)) return false;
      if (labFilters.killzones.length && !labFilters.killzones.includes(t.killzone)) return false;
      if (labFilters.directions.length && !labFilters.directions.includes(t.direction)) return false;
      if (labFilters.grades.length && !labFilters.grades.includes(t.setupGrade)) return false;
      if (labFilters.results.length && !labFilters.results.includes(t.result)) return false;
      if (labFilters.sweep && !t.sweep) return false;
      if (labFilters.displacement && !t.displacement) return false;
      if (labFilters.mss && !t.mss) return false;
      if (labFilters.pullback && !t.pullback) return false;
      return true;
    });
    return { list, stats: computeStats(list) };
  }, [researchTrades, labFilters]);
  const clearLab = () => setLabFilters({ pairs: [], killzones: [], directions: [], grades: [], results: [], sweep: false, displacement: false, mss: false, pullback: false });

  const liveComputed = useMemo(() => {
    const sorted = [...liveTrades].sort((a, b) => (a.date > b.date ? 1 : -1));
    let balance = account.size, peak = account.size, maxDDSoFar = 0;
    const rows = sorted.map((t) => {
      const pnl = account.size * (num(t.riskPct, 0) / 100) * num(t.achievedR, 0);
      balance += pnl; peak = Math.max(peak, balance);
      const dd = peak > 0 ? ((peak - balance) / peak) * 100 : 0;
      maxDDSoFar = Math.max(maxDDSoFar, dd);
      return { ...t, pnl, balance, dd };
    });
    const today = todayStr();
    const todayPnl = rows.filter((r) => r.date === today).reduce((s, r) => s + r.pnl, 0);
    const todayLossPct = todayPnl < 0 ? (Math.abs(todayPnl) / account.size) * 100 : 0;
    const totalR = liveTrades.reduce((s, t) => s + num(t.achievedR, 0), 0);
    const currentBalance = rows.length ? rows[rows.length - 1].balance : account.size;
    const currentDD = peak > 0 ? ((peak - currentBalance) / peak) * 100 : 0;
    return {
      rows: rows.reverse(), totalR, currentBalance, currentDD, maxDDSoFar, todayLossPct,
      remainingDaily: Math.max(0, account.dailyLimitPct - todayLossPct),
      remainingDD: Math.max(0, account.maxDrawdownPct - currentDD),
    };
  }, [liveTrades, account]);

  return (
    <div style={{ minHeight: "100%", background: "var(--bg)" }}>
      <header className="header">
        <div className="brand">
          <div className="brand-mark">SMT</div>
          <div>
            <div className="brand-title">SMT PRO</div>
            <div className="brand-sub">Samet Method Trading — Operating System</div>
          </div>
        </div>
        <div className="mode-switch">
          <Pill active={mode === "research"} onClick={() => setMode("research")} icon="flask">Research</Pill>
          <Pill active={mode === "live"} onClick={() => setMode("live")} icon="radio">Live Trading</Pill>
        </div>
      </header>

      {mode === "research" && (
        <React.Fragment>
          <nav className="subnav">
            <Pill active={researchTab === "log"} onClick={() => setResearchTab("log")} icon="grid">Research</Pill>
            <Pill active={researchTab === "analytics"} onClick={() => setResearchTab("analytics")} icon="gauge">Analytics</Pill>
            <Pill active={researchTab === "lab"} onClick={() => setResearchTab("lab")} icon="filter">Research Lab</Pill>
          </nav>

          {researchTab === "log" && (
            <section className="panel">
              <div className="panel-head">
                <div>
                  <div className="panel-title">İşlem Günlüğü</div>
                  <div className="panel-sub">{researchTrades.length} işlem kayıtlı</div>
                </div>
                <button className="btn-gold" onClick={() => setFormOpen((v) => !v)}>
                  <Icon name={formOpen ? "x" : "plus"} size={14} />{formOpen ? "Kapat" : "Yeni İşlem"}
                </button>
              </div>

              {formOpen && (
                <div className="form-card">
                  <div className="form-grid">
                    <Field label="Tarih"><input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} /></Field>
                    <Field label="Parite">
                      <select value={draft.pair} onChange={(e) => setDraft({ ...draft, pair: e.target.value })}>
                        {PAIRS.map((p) => <option key={p}>{p}</option>)}
                      </select>
                    </Field>
                    <Field label="Timeframe"><input value={draft.timeframe} onChange={(e) => setDraft({ ...draft, timeframe: e.target.value })} placeholder="15m, 1H, 4H..." /></Field>
                    <Field label="Yön">
                      <div className="dir-toggle">
                        <button type="button" className={draft.direction === "Long" ? "dir-on-long" : ""} onClick={() => setDraft({ ...draft, direction: "Long" })}><Icon name="trendUp" size={13} /> Long</button>
                        <button type="button" className={draft.direction === "Short" ? "dir-on-short" : ""} onClick={() => setDraft({ ...draft, direction: "Short" })}><Icon name="trendDown" size={13} /> Short</button>
                      </div>
                    </Field>
                    <Field label="Weekly Bias"><select value={draft.weeklyBias} onChange={(e) => setDraft({ ...draft, weeklyBias: e.target.value })}>{BIAS.map((b) => <option key={b}>{b}</option>)}</select></Field>
                    <Field label="Daily Bias"><select value={draft.dailyBias} onChange={(e) => setDraft({ ...draft, dailyBias: e.target.value })}>{BIAS.map((b) => <option key={b}>{b}</option>)}</select></Field>
                    <Field label="Premium / Discount"><select value={draft.pd} onChange={(e) => setDraft({ ...draft, pd: e.target.value })}>{PD.map((b) => <option key={b}>{b}</option>)}</select></Field>
                    <Field label="Kill Zone"><select value={draft.killzone} onChange={(e) => setDraft({ ...draft, killzone: e.target.value })}>{KILLZONES.map((k) => <option key={k}>{k}</option>)}</select></Field>
                    <Field label="Draw on Liquidity" span={2}><input value={draft.dol} onChange={(e) => setDraft({ ...draft, dol: e.target.value })} placeholder="örn. Weekly Low" /></Field>
                    <Field label="Asia High"><input value={draft.asiaHigh} onChange={(e) => setDraft({ ...draft, asiaHigh: e.target.value })} /></Field>
                    <Field label="Asia Low"><input value={draft.asiaLow} onChange={(e) => setDraft({ ...draft, asiaLow: e.target.value })} /></Field>
                    <Field label="DR"><input value={draft.dr} onChange={(e) => setDraft({ ...draft, dr: e.target.value })} /></Field>
                    <Field label="IDR"><input value={draft.idr} onChange={(e) => setDraft({ ...draft, idr: e.target.value })} /></Field>
                    <Field label="Risk %"><input type="number" step="0.1" value={draft.riskPct} onChange={(e) => setDraft({ ...draft, riskPct: e.target.value })} /></Field>
                    <Field label="RR (Planlanan)"><input type="number" step="0.1" value={draft.rr} onChange={(e) => setDraft({ ...draft, rr: e.target.value })} /></Field>
                  </div>

                  <div className="checklist-block">
                    <div className="checklist-head">
                      <span>Execution Checklist — Modül 5</span>
                      <span className={`gate ${confluenceCount(draft) === 9 && num(draft.rr) >= 3 ? "gate-ok" : "gate-no"}`}>
                        {confluenceCount(draft) === 9 && num(draft.rr) >= 3
                          ? (<React.Fragment><Icon name="check" size={12} /> GEÇERLİ İŞLEM</React.Fragment>)
                          : (<React.Fragment><Icon name="alert" size={12} /> {confluenceCount(draft)}/9 · FİLTRE DIŞI</React.Fragment>)}
                      </span>
                    </div>
                    <ConfluenceChain trade={draft} onToggle={(key) => setDraft({ ...draft, [key]: !draft[key] })} />
                  </div>

                  <div className="form-grid" style={{ marginTop: 14 }}>
                    <Field label="Setup Grade"><select value={draft.setupGrade} onChange={(e) => setDraft({ ...draft, setupGrade: e.target.value })}>{GRADES.map((g) => <option key={g}>{g}</option>)}</select></Field>
                    <Field label="Sonuç"><select value={draft.result} onChange={(e) => setDraft({ ...draft, result: e.target.value })}>{RESULTS.map((r) => <option key={r}>{r}</option>)}</select></Field>
                    <Field label="Elde Edilen R"><input type="number" step="0.1" value={draft.achievedR} onChange={(e) => setDraft({ ...draft, achievedR: e.target.value })} /></Field>
                    <Field label="Screenshot (Before) — URL"><input value={draft.screenshotBefore} onChange={(e) => setDraft({ ...draft, screenshotBefore: e.target.value })} placeholder="https://..." /></Field>
                    <Field label="Screenshot (After) — URL"><input value={draft.screenshotAfter} onChange={(e) => setDraft({ ...draft, screenshotAfter: e.target.value })} placeholder="https://..." /></Field>
                    <Field label="Not" span={3}><textarea rows={2} value={draft.note} onChange={(e) => setDraft({ ...draft, note: e.target.value })} /></Field>
                  </div>
                  <div className="form-actions"><button className="btn-gold" onClick={saveDraft}><Icon name="save" size={14} /> Save</button></div>
                </div>
              )}

              <div className="trade-list">
                {researchTrades.length === 0 && <div className="empty">Henüz işlem yok. "Yeni İşlem" ile ilk backtest kaydını ekle.</div>}
                {researchTrades.map((t) => (
                  <div key={t.id} className="trade-row">
                    <div className="trade-row-main" onClick={() => setExpandedId(expandedId === t.id ? null : t.id)}>
                      <span className="tr-date">{t.date}</span>
                      <span className="tr-pair">{t.pair}</span>
                      <span className={`tr-dir ${t.direction === "Long" ? "dir-long" : "dir-short"}`}><Icon name={t.direction === "Long" ? "trendUp" : "trendDown"} size={12} /> {t.direction}</span>
                      <span className="tr-kz">{t.killzone}</span>
                      <span className="tr-grade">{t.setupGrade}</span>
                      <span className={`tr-result res-${t.result.toLowerCase()}`}>{t.result}</span>
                      <span className="tr-r">{num(t.achievedR) >= 0 ? "+" : ""}{fmt1(num(t.achievedR))}R</span>
                      <ConfluenceChain trade={t} onToggle={() => {}} compact />
                      <span className="tr-expand"><Icon name={expandedId === t.id ? "chevronUp" : "chevronDown"} size={14} /></span>
                    </div>
                    {expandedId === t.id && (
                      <div className="trade-row-detail">
                        <div className="detail-grid">
                          <div><b>Weekly Bias</b>{t.weeklyBias}</div>
                          <div><b>Daily Bias</b>{t.dailyBias}</div>
                          <div><b>Premium/Discount</b>{t.pd}</div>
                          <div><b>DOL</b>{t.dol || "—"}</div>
                          <div><b>Asia High/Low</b>{t.asiaHigh || "—"} / {t.asiaLow || "—"}</div>
                          <div><b>DR / IDR</b>{t.dr || "—"} / {t.idr || "—"}</div>
                          <div><b>Risk</b>%{t.riskPct}</div>
                          <div><b>RR Planlanan</b>{t.rr}</div>
                          <div><b>Timeframe</b>{t.timeframe}</div>
                        </div>
                        {t.note && <div className="detail-note">{t.note}</div>}
                        {(t.screenshotBefore || t.screenshotAfter) && (
                          <div className="detail-shots">
                            {t.screenshotBefore && <a href={t.screenshotBefore} target="_blank" rel="noreferrer" className="shot-link"><Icon name="image" size={12} /> Before</a>}
                            {t.screenshotAfter && <a href={t.screenshotAfter} target="_blank" rel="noreferrer" className="shot-link"><Icon name="image" size={12} /> After</a>}
                          </div>
                        )}
                        <button className="btn-ghost-danger" onClick={() => deleteTrade(t.id)}><Icon name="trash" size={12} /> Sil</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </section>
          )}

          {researchTab === "analytics" && (
            <section className="panel">
              <div className="panel-head">
                <div><div className="panel-title">Analytics</div><div className="panel-sub">Tüm research verisi üzerinden otomatik hesap</div></div>
              </div>
              <div className="stat-row">
                <StatCard label="Toplam İşlem" value={overall.total} />
                <StatCard label="Win Rate" value={`${fmt1(overall.winRate)}%`} tone={overall.winRate >= 50 ? "good" : "bad"} />
                <StatCard label="Profit Factor" value={overall.pf === Infinity ? "∞" : fmt2(overall.pf)} tone={overall.pf >= 2 ? "good" : "bad"} />
                <StatCard label="Average R" value={`${overall.avgR >= 0 ? "+" : ""}${fmt2(overall.avgR)}`} tone={overall.avgR >= 0 ? "good" : "bad"} />
              </div>
              <div className="pair-breakdown">
                {byPair.length === 0 && <div className="empty">Kırılım için veri yok.</div>}
                {byPair.map((p) => (
                  <div key={p.pair} className="pair-row">
                    <div className="pair-row-head">
                      <span className="pair-name">{p.pair}</span>
                      <span className="pair-meta">{p.total} işlem · PF {p.pf === Infinity ? "∞" : fmt2(p.pf)} · Avg RR {fmt2(p.avgR)}</span>
                    </div>
                    <div className="bar-track"><div className="bar-fill" style={{ width: `${Math.min(100, p.winRate)}%` }} /><span className="bar-label">{fmt1(p.winRate)}% Win Rate</span></div>
                  </div>
                ))}
              </div>
              <div className="ai-teaser">
                <div className="ai-teaser-title">Sonra AI Ekleriz</div>
                <div className="ai-teaser-body">"Son 30 kaybeden işleminin %61'inde Displacement zayıfmış." gibi kişiye özel analizler bu alanda görünecek — yeterli veri biriktikçe aktifleşecek.</div>
              </div>
            </section>
          )}

          {researchTab === "lab" && (
            <section className="panel lab-panel">
              <div className="panel-head">
                <div><div className="panel-title">Research Lab</div><div className="panel-sub">Filtreleri seç, tek tuşla sorgula</div></div>
                <button className="btn-ghost" onClick={clearLab}><Icon name="x" size={13} /> Temizle</button>
              </div>
              <div className="lab-grid">
                <div className="lab-filters">
                  <div className="lab-group"><div className="lab-group-title">Parite</div><div className="chip-row">{PAIRS.map((p) => <button key={p} className={`chip ${labFilters.pairs.includes(p) ? "chip-on" : ""}`} onClick={() => toggleArr("pairs", p)}>{p}</button>)}</div></div>
                  <div className="lab-group"><div className="lab-group-title">Seans</div><div className="chip-row">{KILLZONES.map((k) => <button key={k} className={`chip ${labFilters.killzones.includes(k) ? "chip-on" : ""}`} onClick={() => toggleArr("killzones", k)}>{k}</button>)}</div></div>
                  <div className="lab-group"><div className="lab-group-title">Yön</div><div className="chip-row">{["Long", "Short"].map((d) => <button key={d} className={`chip ${labFilters.directions.includes(d) ? "chip-on" : ""}`} onClick={() => toggleArr("directions", d)}>{d}</button>)}</div></div>
                  <div className="lab-group"><div className="lab-group-title">Setup Grade</div><div className="chip-row">{GRADES.map((g) => <button key={g} className={`chip ${labFilters.grades.includes(g) ? "chip-on" : ""}`} onClick={() => toggleArr("grades", g)}>{g}</button>)}</div></div>
                  <div className="lab-group"><div className="lab-group-title">Sonuç</div><div className="chip-row">{RESULTS.map((r) => <button key={r} className={`chip ${labFilters.results.includes(r) ? "chip-on" : ""}`} onClick={() => toggleArr("results", r)}>{r}</button>)}</div></div>
                  <div className="lab-group">
                    <div className="lab-group-title">Confluence</div>
                    <div className="chip-row">
                      <button className={`chip ${labFilters.sweep ? "chip-on" : ""}`} onClick={() => toggleBool("sweep")}>Liquidity Sweep</button>
                      <button className={`chip ${labFilters.displacement ? "chip-on" : ""}`} onClick={() => toggleBool("displacement")}>Displacement</button>
                      <button className={`chip ${labFilters.mss ? "chip-on" : ""}`} onClick={() => toggleBool("mss")}>MSS</button>
                      <button className={`chip ${labFilters.pullback ? "chip-on" : ""}`} onClick={() => toggleBool("pullback")}>Pullback</button>
                    </div>
                  </div>
                </div>
                <div className="lab-results">
                  <div className="stat-row">
                    <StatCard label="Toplam İşlem" value={labResult.stats.total} />
                    <StatCard label="Win Rate" value={`${fmt1(labResult.stats.winRate)}%`} tone={labResult.stats.winRate >= 50 ? "good" : "bad"} />
                    <StatCard label="Average RR" value={fmt2(labResult.stats.avgR)} />
                  </div>
                  <div className="lab-list">
                    {labResult.list.length === 0 && <div className="empty">Bu filtrelerle eşleşen işlem yok.</div>}
                    {labResult.list.map((t) => (
                      <div key={t.id} className="lab-item">
                        <span>{t.date}</span><span className="pair-name">{t.pair}</span><span>{t.killzone}</span>
                        <span className={`tr-result res-${t.result.toLowerCase()}`}>{t.result}</span>
                        <span>{num(t.achievedR) >= 0 ? "+" : ""}{fmt1(num(t.achievedR))}R</span>
                        <span className="tr-grade">{t.setupGrade}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>
          )}
        </React.Fragment>
      )}

      {mode === "live" && (
        <section className="panel">
          <div className="panel-head">
            <div><div className="panel-title">{account.name}</div><div className="panel-sub">Live Trading — Prop Firm Risk Engine</div></div>
            <button className="btn-ghost" onClick={() => setAccountEditOpen((v) => !v)}><Icon name="settings" size={13} /> Hesap Ayarları</button>
          </div>

          {accountEditOpen && (
            <div className="form-card">
              <div className="form-grid">
                <Field label="Hesap Adı"><input value={account.name} onChange={(e) => persistAccount({ ...account, name: e.target.value })} /></Field>
                <Field label="Hesap Büyüklüğü ($)"><input type="number" value={account.size} onChange={(e) => persistAccount({ ...account, size: num(e.target.value, 0) })} /></Field>
                <Field label="Günlük Zarar Limiti (%)"><input type="number" step="0.1" value={account.dailyLimitPct} onChange={(e) => persistAccount({ ...account, dailyLimitPct: num(e.target.value, 0) })} /></Field>
                <Field label="Maks. Drawdown (%)"><input type="number" step="0.1" value={account.maxDrawdownPct} onChange={(e) => persistAccount({ ...account, maxDrawdownPct: num(e.target.value, 0) })} /></Field>
              </div>
            </div>
          )}

          <div className="stat-row">
            <StatCard label="Güncel Bakiye" value={`$${liveComputed.currentBalance.toLocaleString(undefined, { maximumFractionDigits: 0 })}`} />
            <StatCard label="Toplam R" value={`${liveComputed.totalR >= 0 ? "+" : ""}${fmt2(liveComputed.totalR)}`} tone={liveComputed.totalR >= 0 ? "good" : "bad"} />
            <StatCard label="Kalan Günlük Risk" value={`${fmt1(liveComputed.remainingDaily)}%`} sub={`limit %${account.dailyLimitPct}`} tone={liveComputed.remainingDaily > 1 ? "good" : "bad"} />
            <StatCard label="Kalan Drawdown Payı" value={`${fmt1(liveComputed.remainingDD)}%`} sub={`limit %${account.maxDrawdownPct}`} tone={liveComputed.remainingDD > 2 ? "good" : "bad"} />
          </div>

          <div className="dd-bars">
            <div className="dd-bar-block">
              <div className="dd-bar-label"><span>Günlük Kullanım</span><span>{fmt1(liveComputed.todayLossPct)}% / {account.dailyLimitPct}%</span></div>
              <div className="bar-track bar-track-slim"><div className={`bar-fill ${liveComputed.todayLossPct / account.dailyLimitPct > 0.8 ? "bar-danger" : ""}`} style={{ width: `${Math.min(100, (liveComputed.todayLossPct / (account.dailyLimitPct || 1)) * 100)}%` }} /></div>
            </div>
            <div className="dd-bar-block">
              <div className="dd-bar-label"><span>Toplam Drawdown</span><span>{fmt1(liveComputed.currentDD)}% / {account.maxDrawdownPct}%</span></div>
              <div className="bar-track bar-track-slim"><div className={`bar-fill ${liveComputed.currentDD / account.maxDrawdownPct > 0.8 ? "bar-danger" : ""}`} style={{ width: `${Math.min(100, (liveComputed.currentDD / (account.maxDrawdownPct || 1)) * 100)}%` }} /></div>
            </div>
          </div>

          <div className="panel-head" style={{ marginTop: 24 }}>
            <div className="panel-title" style={{ fontSize: 15 }}>İşlemler</div>
            <button className="btn-gold" onClick={() => setLiveFormOpen((v) => !v)}><Icon name={liveFormOpen ? "x" : "plus"} size={14} />{liveFormOpen ? "Kapat" : "Yeni İşlem"}</button>
          </div>

          {liveFormOpen && (
            <div className="form-card">
              <div className="form-grid">
                <Field label="Tarih"><input type="date" value={liveDraft.date} onChange={(e) => setLiveDraft({ ...liveDraft, date: e.target.value })} /></Field>
                <Field label="Parite"><select value={liveDraft.pair} onChange={(e) => setLiveDraft({ ...liveDraft, pair: e.target.value })}>{PAIRS.map((p) => <option key={p}>{p}</option>)}</select></Field>
                <Field label="Yön">
                  <div className="dir-toggle">
                    <button type="button" className={liveDraft.direction === "Long" ? "dir-on-long" : ""} onClick={() => setLiveDraft({ ...liveDraft, direction: "Long" })}><Icon name="trendUp" size={13} /> Long</button>
                    <button type="button" className={liveDraft.direction === "Short" ? "dir-on-short" : ""} onClick={() => setLiveDraft({ ...liveDraft, direction: "Short" })}><Icon name="trendDown" size={13} /> Short</button>
                  </div>
                </Field>
                <Field label="Kill Zone"><select value={liveDraft.killzone} onChange={(e) => setLiveDraft({ ...liveDraft, killzone: e.target.value })}>{KILLZONES.map((k) => <option key={k}>{k}</option>)}</select></Field>
                <Field label="Risk %"><input type="number" step="0.1" value={liveDraft.riskPct} onChange={(e) => setLiveDraft({ ...liveDraft, riskPct: e.target.value })} /></Field>
                <Field label="Sonuç"><select value={liveDraft.result} onChange={(e) => setLiveDraft({ ...liveDraft, result: e.target.value })}>{RESULTS.map((r) => <option key={r}>{r}</option>)}</select></Field>
                <Field label="Elde Edilen R"><input type="number" step="0.1" value={liveDraft.achievedR} onChange={(e) => setLiveDraft({ ...liveDraft, achievedR: e.target.value })} /></Field>
                <Field label="Not" span={3}><textarea rows={2} value={liveDraft.note} onChange={(e) => setLiveDraft({ ...liveDraft, note: e.target.value })} /></Field>
              </div>
              <div className="form-actions"><button className="btn-gold" onClick={saveLiveDraft}><Icon name="save" size={14} /> Save</button></div>
            </div>
          )}

          <div className="trade-list">
            {liveComputed.rows.length === 0 && <div className="empty">Henüz canlı işlem yok.</div>}
            {liveComputed.rows.map((t) => (
              <div key={t.id} className="trade-row">
                <div className="trade-row-main">
                  <span className="tr-date">{t.date}</span>
                  <span className="tr-pair">{t.pair}</span>
                  <span className={`tr-dir ${t.direction === "Long" ? "dir-long" : "dir-short"}`}><Icon name={t.direction === "Long" ? "trendUp" : "trendDown"} size={12} /> {t.direction}</span>
                  <span className="tr-kz">{t.killzone}</span>
                  <span className={`tr-result res-${t.result.toLowerCase()}`}>{t.result}</span>
                  <span className="tr-r">{t.achievedR >= 0 ? "+" : ""}{fmt1(t.achievedR)}R</span>
                  <span className="tr-pnl">{t.pnl >= 0 ? "+" : ""}${t.pnl.toFixed(0)}</span>
                  <button className="btn-ghost-danger btn-icon-only" onClick={() => deleteTrade(t.id)}><Icon name="trash" size={12} /></button>
                </div>
              </div>
            ))}
          </div>
        </section>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SMTPro />);
</script>
</body>
</html>
