<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMT PRO — Samet Method Trading</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg:#0B0F11; --surface:#12181B; --surface-2:#1A2226; --surface-3:#212B30;
  --border:#28333A; --border-soft:#1E272C;
  --text:#E7ECEE; --text-dim:#9AA7AC; --text-faint:#5E6C72;
  --gold:#C9A24B; --gold-bright:#E0BC66; --gold-dim: rgba(201,162,75,0.14);
  --green:#5FA37A; --green-dim: rgba(95,163,122,0.14);
  --red:#C1584C; --red-dim: rgba(193,88,76,0.14);
  --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
* { box-sizing: border-box; }
html, body, #root { height:100%; margin:0; }
body { background: var(--bg); font-family: var(--font-body); }
div, button, input, select, textarea, span { font-family: var(--font-body); }

.header { display:flex; align-items:center; justify-content:space-between; padding:20px 28px; border-bottom:1px solid var(--border-soft); flex-wrap:wrap; gap:12px; }
.brand { display:flex; align-items:center; gap:12px; }
.brand-mark { font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--bg); background:linear-gradient(135deg, var(--gold-bright), var(--gold)); width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; letter-spacing:0.5px; }
.brand-title { font-family:var(--font-display); font-weight:700; font-size:18px; color:var(--text); letter-spacing:0.3px; }
.brand-sub { font-size:11px; color:var(--text-faint); margin-top:1px; }

.mode-switch, .subnav { display:flex; gap:8px; flex-wrap:wrap; }
.subnav { padding:16px 28px 0; }

.pill { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-size:12.5px; font-weight:500; cursor:pointer; transition:all .15s ease; }
.pill:hover { color:var(--text); border-color:var(--gold); }
.pill-active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold-bright); }

.panel { padding:22px 28px 40px; max-width:1180px; margin:0 auto; }
.panel-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.panel-title { font-family:var(--font-display); font-size:17px; font-weight:600; color:var(--text); }
.panel-sub { font-size:12px; color:var(--text-faint); margin-top:2px; }

.btn-gold { display:flex; align-items:center; gap:6px; background:var(--gold); color:#1A1406; border:none; padding:9px 16px; border-radius:8px; font-weight:600; font-size:12.5px; cursor:pointer; }
.btn-gold:hover { background:var(--gold-bright); }
.btn-ghost { display:flex; align-items:center; gap:6px; background:transparent; color:var(--text-dim); border:1px solid var(--border); padding:8px 14px; border-radius:8px; font-size:12.5px; cursor:pointer; }
.btn-ghost:hover { color:var(--text); border-color:var(--text-faint); }
.btn-ghost-danger { display:flex; align-items:center; gap:6px; background:transparent; color:var(--red); border:1px solid var(--red); opacity:0.75; padding:6px 12px; border-radius:6px; font-size:11.5px; cursor:pointer; margin-top:8px; }
.btn-ghost-danger:hover { opacity:1; }
.btn-icon-only { padding:5px 7px; margin-top:0; }

.form-card { background:var(--surface); border:1px solid var(--border-soft); border-radius:12px; padding:20px; margin-bottom:20px; }
.form-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; }
.field { display:flex; flex-direction:column; gap:5px; }
.field-label { font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-faint); font-weight:600; }
input, select, textarea { background:var(--surface-2); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:6px; font-size:12.5px; font-family:var(--font-mono); width:100%; }
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--gold); }
textarea { font-family:var(--font-body); resize:vertical; }
.form-actions { display:flex; justify-content:flex-end; margin-top:16px; }

.dir-toggle { display:flex; gap:6px; }
.dir-toggle button { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); font-size:12px; cursor:pointer; }
.dir-on-long { border-color:var(--green) !important; color:var(--green) !important; background:var(--green-dim) !important; }
.dir-on-short { border-color:var(--red) !important; color:var(--red) !important; background:var(--red-dim) !important; }

.checklist-block { margin-top:16px; padding:16px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:10px; }
.checklist-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; font-size:11.5px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; flex-wrap:wrap; gap:8px; }
.gate { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:10.5px; font-weight:700; letter-spacing:0.03em; }
.gate-ok { background:var(--green-dim); color:var(--green); }
.gate-no { background:var(--red-dim); color:var(--red); }

.chain { display:flex; align-items:center; flex-wrap:wrap; }
.chain-node-wrap { display:flex; align-items:center; flex-direction:column; position:relative; }
.chain-node { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); color:var(--text-faint); display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1; }
.chain-node-on { border-color:var(--gold); background:var(--gold); color:#1A1406; }
.chain-dot { width:4px; height:4px; border-radius:50%; background:var(--text-faint); }
.chain-label { font-size:9px; color:var(--text-faint); margin-top:5px; white-space:nowrap; max-width:60px; text-align:center; }
.chain-line { position:absolute; top:11px; left:22px; width:22px; height:1.5px; background:var(--border); }
.chain-compact .chain-node { width:14px; height:14px; }
.chain-compact .chain-line { top:7px; left:14px; width:8px; }
.chain-compact { gap:0; }

.trade-list { display:flex; flex-direction:column; gap:8px; }
.trade-row { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; overflow:hidden; }
.trade-row-main { display:flex; align-items:center; gap:16px; padding:12px 16px; cursor:pointer; font-family:var(--font-mono); font-size:12px; flex-wrap:wrap; }
.trade-row-main:hover { background:var(--surface-2); }
.tr-date { color:var(--text-faint); width:80px; }
.tr-pair { font-weight:600; color:var(--text); width:64px; }
.tr-dir { display:flex; align-items:center; gap:4px; width:64px; }
.dir-long { color:var(--green); } .dir-short { color:var(--red); }
.tr-kz { color:var(--text-dim); width:60px; }
.tr-grade { color:var(--gold); width:24px; }
.tr-result { padding:2px 8px; border-radius:5px; font-size:10.5px; font-weight:700; width:40px; text-align:center; }
.res-win { background:var(--green-dim); color:var(--green); } .res-loss { background:var(--red-dim); color:var(--red); } .res-be { background:var(--surface-3); color:var(--text-dim); }
.tr-r { width:50px; color:var(--text); }
.tr-pnl { width:70px; color:var(--text); }
.tr-expand { margin-left:auto; color:var(--text-faint); }
.trade-row-detail { padding:16px; border-top:1px solid var(--border-soft); background:var(--surface-2); }
.detail-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; font-size:11.5px; }
.detail-grid div { display:flex; flex-direction:column; gap:2px; color:var(--text); }
.detail-grid b { font-size:9.5px; text-transform:uppercase; color:var(--text-faint); font-weight:600; letter-spacing:0.04em; }
.detail-note { margin-top:12px; font-size:12px; color:var(--text-dim); background:var(--surface); padding:10px; border-radius:6px; }
.detail-shots { display:flex; gap:10px; margin-top:10px; }
.shot-link { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--gold); text-decoration:none; }
.empty { padding:32px; text-align:center; color:var(--text-faint); font-size:12.5px; border:1px dashed var(--border); border-radius:10px; }

.stat-row { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:22px; }
.stat-card { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:14px 16px; }
.stat-label { font-size:10.5px; text-transform:uppercase; color:var(--text-faint); letter-spacing:0.05em; font-weight:600; margin-bottom:6px; }
.stat-value { font-family:var(--font-mono); font-size:22px; font-weight:600; color:var(--text); }
.stat-value.good { color:var(--green); } .stat-value.bad { color:var(--red); }
.stat-sub { font-size:10px; color:var(--text-faint); margin-top:2px; }

.pair-breakdown { display:flex; flex-direction:column; gap:12px; }
.pair-row { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:14px 16px; }
.pair-row-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; flex-wrap:wrap; gap:6px; }
.pair-name { font-family:var(--font-display); font-weight:600; color:var(--text); font-size:14px; }
.pair-meta { font-size:11px; color:var(--text-faint); font-family:var(--font-mono); }
.bar-track { position:relative; height:22px; background:var(--surface-3); border-radius:6px; overflow:hidden; }
.bar-track-slim { height:8px; }
.bar-fill { height:100%; background:linear-gradient(90deg, var(--gold), var(--gold-bright)); border-radius:6px; }
.bar-fill.bar-danger { background:linear-gradient(90deg, var(--red), #d8776c); }
.bar-label { position:absolute; right:8px; top:2px; font-size:10.5px; font-family:var(--font-mono); color:var(--text); }

.ai-teaser { margin-top:24px; border:1px dashed var(--gold); background:var(--gold-dim); border-radius:10px; padding:16px 18px; }
.ai-teaser-title { font-family:var(--font-display); font-weight:600; color:var(--gold-bright); font-size:13px; margin-bottom:5px; }
.ai-teaser-body { font-size:12px; color:var(--text-dim); line-height:1.5; }

.lab-grid { display:grid; grid-template-columns:280px 1fr; gap:20px; align-items:start; }
.lab-filters { background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:16px; display:flex; flex-direction:column; gap:16px; }
.lab-group-title { font-size:10.5px; text-transform:uppercase; color:var(--text-faint); font-weight:600; letter-spacing:0.05em; margin-bottom:8px; }
.chip-row { display:flex; flex-wrap:wrap; gap:6px; }
.chip { padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); font-size:11px; cursor:pointer; }
.chip-on { border-color:var(--gold); background:var(--gold-dim); color:var(--gold-bright); }
.lab-results { display:flex; flex-direction:column; gap:16px; }
.lab-list { display:flex; flex-direction:column; gap:6px; }
.lab-item { display:grid; grid-template-columns:70px 60px 60px 44px 50px 30px; gap:12px; align-items:center; background:var(--surface); border:1px solid var(--border-soft); padding:9px 14px; border-radius:8px; font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim); }

.dd-bars { display:flex; flex-direction:column; gap:14px; margin-bottom:8px; }
.dd-bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); font-family:var(--font-mono); margin-bottom:6px; }

@media (max-width: 860px) {
  .form-grid { grid-template-columns:repeat(2,1fr); }
  .stat-row { grid-template-columns:repeat(2,1fr); }
  .lab-grid { grid-template-columns:1fr; }
  .trade-row-main { flex-wrap:wrap; }
}
</style>
</head>

  return {
    total,
    winRate,
    pf,
    avgR
  };
}
